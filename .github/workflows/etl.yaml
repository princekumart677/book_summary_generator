name: ETL Pipeline - Fetch and Process Books

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  etl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create ETL script
        run: |
          cat > etl.js << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const books = [
            { id: '1342', title: 'Pride and Prejudice', author: 'Jane Austen' },
            { id: '84', title: 'Frankenstein', author: 'Mary Shelley' },
            { id: '2701', title: 'Moby Dick', author: 'Herman Melville' },
            { id: '64317', title: 'Great Expectations', author: 'Charles Dickens' },
            { id: '43', title: 'The Strange Case of Dr Jekyll and Mr Hyde', author: 'Robert Louis Stevenson' }
          ];

          function fetchBookText(bookId) {
            return new Promise((resolve, reject) => {
              const url = `https://www.gutenberg.org/cache/epub/${bookId}/pg${bookId}.txt`;
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          async function generateSummary(text, chapterNum, bookTitle) {
            // Use first 2000 chars as context
            const context = text.substring(0, 2000);
            
            const response = await fetch(
              'https://models.inference.ai.azure.com/chat/completions',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN
                },
                body: JSON.stringify({
                  messages: [
                    { 
                      role: 'system', 
                      content: 'You are a helpful assistant that summarizes chapters of books. Provide a brief 1-2 sentence summary.' 
                    },
                    { 
                      role: 'user', 
                      content: `In "${bookTitle}", summarize chapter ${chapterNum}. Text: ${context}` 
                    }
                  ],
                  model: 'gpt-4o-mini',
                  max_tokens: 200,
                  temperature: 0.7
                })
              }
            );

            const data = await response.json();
            return data.choices[0].message.content;
          }

          async function processBooks() {
            const bookData = [];
            
            for (const book of books) {
              console.log('Fetching ' + book.title + '...');
              
              try {
                const text = await fetchBookText(book.id);
                
                // Split into roughly 10 parts
                const chunkSize = Math.floor(text.length / 10);
                const chapters = [];
                
                for (let i = 0; i < 10; i++) {
                  const start = i * chunkSize;
                  const end = (i + 1) * chunkSize;
                  const chunk = text.substring(start, end);
                  
                  console.log('Generating summary for chapter ' + (i + 1) + '...');
                  let summary = 'Chapter summary not available.';
                  
                  try {
                    summary = await generateSummary(chunk, i + 1, book.title);
                  } catch (e) {
                    console.log('Summary generation failed, using fallback');
                    summary = 'This chapter continues the narrative of ' + book.title + ' by ' + book.author + '.';
                  }
                  
                  chapters.push({
                    number: i + 1,
                    title: 'Chapter ' + (i + 1),
                    summary: summary
                  });
                }

                bookData.push({
                  id: book.id,
                  title: book.title,
                  author: book.author,
                  gutenbergId: book.id,
                  description: 'A classic work of literature by ' + book.author + '.',
                  chapters: chapters
                });
                
                console.log('Completed: ' + book.title);
              } catch (e) {
                console.log('Error fetching ' + book.title + ': ' + e.message);
              }
            }

            fs.writeFileSync('data/books.json', JSON.stringify(bookData, null, 2));
            console.log('ETL Complete: Book data saved to data/books.json');
          }

          processBooks();
          EOF

      - name: Run ETL script
        env:
          GITHUB_TOKEN: ${{ secrets.MODELS_TOKEN }}
        run: node etl.js

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ETL: Update book data with real summaries"
          file_pattern: "data/*"